name: Test

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: fittrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.3"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Cache Go build and tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/bin
          key: ${{ runner.os }}-go-tools-goose-v3.24.3-govulncheck-v1.3.0
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Install Goose
        run: |
          if ! command -v goose &> /dev/null; then
            go install github.com/pressly/goose/v3/cmd/goose@v3.24.3
          fi

      - name: Install govulncheck
        run: |
          if ! command -v govulncheck &> /dev/null; then
            go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          fi

      - name: Set up test database
        working-directory: server
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fittrack_test?sslmode=disable
        run: |
          echo "Testing database connection..."
          psql "$DATABASE_URL" -c "SELECT version();"
          goose -dir migrations postgres "$DATABASE_URL" up

      - name: Verify Go modules
        working-directory: server
        run: go mod verify

      - name: Scan Go vulnerabilities
        working-directory: server
        run: govulncheck ./...

      - name: Run unit tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fittrack_test?sslmode=disable
        run: |
          go test -short ./...

      - name: Run integration tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fittrack_test?sslmode=disable
        run: |
          go test -v ./...

  frontend-test:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.bun/install/cache
            client/node_modules
          key: ${{ runner.os }}-bun-1.3.10-${{ hashFiles('client/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.10-

      - name: Install dependencies
        working-directory: client
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/bun.lock', 'client/playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: client
        run: bunx playwright install --with-deps chromium

      - name: Run format check
        working-directory: client
        run: bun run fmt:check

      - name: Run lint
        working-directory: client
        run: bun run lint

      - name: Run type checking
        working-directory: client
        run: bun run tsc

      - name: Run unit tests
        working-directory: client
        run: bun run test

      - name: Run E2E tests
        working-directory: client
        run: bun run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            client/playwright-report
            client/test-results
          if-no-files-found: ignore
